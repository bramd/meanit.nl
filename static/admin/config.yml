backend:
  name: github
  repo: bramd/meanit.nl
  branch: main
  base_url: https://meanit-cms-auth.fly.dev
  auth_endpoint: /auth

i18n:
  structure: multiple_files
  locales: [nl, en]
  default_locale: nl

media_folder: static/images
public_folder: /images

collections:
  - name: pages
    label: Pages
    i18n: true
    files:
      - name: homepage
        label: Homepage
        file: content/_index.md
        i18n: true
        fields:
          - { label: Title, name: title, widget: string, i18n: true }
          - { label: Full title, name: full_title, widget: boolean, default: true, i18n: duplicate }
          - { label: Body, name: body, widget: markdown, i18n: true }
      - name: about
        label: Over / About
        file: content/over.md
        i18n: true
        fields:
          - { label: Title, name: title, widget: string, i18n: true }
          - { label: Description, name: description, widget: string, i18n: true }
          - { label: URL, name: url, widget: string, i18n: true, required: false }
          - { label: Body, name: body, widget: markdown, i18n: true }
      - name: contact
        label: Contact
        file: content/contact.md
        i18n: true
        fields:
          - { label: Title, name: title, widget: string, i18n: true }
          - { label: Description, name: description, widget: string, i18n: true }
          - { label: Body, name: body, widget: markdown, i18n: true }
